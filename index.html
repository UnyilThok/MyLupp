<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Romantis V25.0 - Cosmic Envelope</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #aa00ff;
            --neon-cyan: #00f3ff;
            --premium-glass: rgba(10, 5, 20, 0.35);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            background: #000000;
            font-family: 'Poppins', system-ui, sans-serif;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Container Video untuk Transisi Halus */
        .video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: #000;
        }

        .video-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.75;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }

        /* Kanvas Partikel */
        #spatial-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* FITUR BARU: Amplop Surat Interaktif Awal */
        .envelope-wrapper {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope {
            font-size: 5.5rem;
            filter: drop-shadow(0 0 20px var(--neon-pink));
            animation: float-envelope 3s infinite ease-in-out;
            transition: transform 0.3s;
        }

        .envelope-wrapper:hover .envelope {
            transform: scale(1.1) rotate(5deg);
        }

        .envelope-text {
            color: #ffffff;
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #fff;
            animation: pulse-text 1.5s infinite ease-in-out;
        }

        @keyframes float-envelope {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Kartu Interaktif Persegi Ultra Transparan V25.0 */
        .v25-card {
            background: var(--premium-glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1.5px solid rgba(255, 255, 255, 0.38);
            padding: 35px 30px; 
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.95), 
                        0 0 60px rgba(255, 0, 127, 0.3);
            max-width: 360px; 
            width: 85%;
            z-index: 10;
            color: #ffffff;
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out, opacity 0.6s ease, transform-box 0.6s ease;
            position: relative;
            opacity: 0;
            transform: scale(0.8) translateZ(0);
            pointer-events: none;
        }

        .v25-card.active {
            opacity: 1;
            transform: scale(1) translateZ(0);
            pointer-events: auto;
        }

        /* Pemutar Musik dengan Efek Visualizer Pulse Premium */
        .music-box {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 12px;
            padding: 10px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.28);
            transform: translateZ(40px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .music-box.playing {
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5), 0 0 10px rgba(255, 0, 127, 0.3);
            border-color: var(--neon-cyan);
            animation: pulse-glow-v25 2.5s infinite ease-in-out;
        }

        @keyframes pulse-glow-v25 {
            0% { transform: translateZ(40px) scale(1); }
            50% { transform: translateZ(40px) scale(1.03); background: rgba(255, 255, 255, 0.22); }
            100% { transform: translateZ(40px) scale(1); }
        }

        .music-info {
            text-align: left;
            font-size: 0.8rem;
            opacity: 0.95;
        }

        .music-title {
            font-weight: 600;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
        }

        .btn-play {
            background: var(--neon-pink);
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px var(--neon-pink);
            transition: 0.3s;
        }

        /* Tema Warna Judul dengan Keterbacaan Ekstra Tinggi */
        h1 {
            font-size: 2.2rem;
            margin-top: 0; margin-bottom: 12px;
            font-weight: 800;
            transform: translateZ(70px);
        }

        .pagi-theme {
            background: linear-gradient(135deg, #fff59d 0%, #ff9100 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.95)) drop-shadow(0 4px 14px rgba(0,0,0,0.8));
        }

        .siang-theme {
            background: linear-gradient(135deg, #00f3ff 0%, #00b0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.95)) drop-shadow(0 4px 14px rgba(0,0,0,0.8));
        }

        .sore-theme {
            background: linear-gradient(135deg, #ffab40 0%, #ff007f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.95)) drop-shadow(0 4px 14px rgba(0,0,0,0.8));
        }

        .malam-theme {
            background: linear-gradient(135deg, #ff8a80 0%, #ff4081 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.95)) drop-shadow(0 4px 14px rgba(0,0,0,0.8));
        }

        /* Teks Deskripsi Interaktif dengan Lapisan Bayangan Super Tebal */
        p.interactive-text {
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 25px;
            color: #ffffff;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.95), 
                         0 4px 15px rgba(0, 0, 0, 0.9),
                         0 0 2px rgba(0, 0, 0, 1);
            transform: translateZ(50px);
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 8px;
            border-radius: 8px;
            position: relative;
        }

        p.interactive-text:hover {
            background: rgba(255, 255, 255, 0.15);
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
        }

        .hint-text {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.65);
            display: block;
            margin-top: -20px;
            margin-bottom: 20px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.95);
            transform: translateZ(45px);
        }

        /* Tombol Utama */
        .btn-v25 {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            border: none;
            padding: 14px 45px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateZ(80px);
        }

        .btn-v25:hover {
            transform: translateZ(100px) scale(1.05);
            box-shadow: 0 0 45px var(--neon-pink), 0 0 25px var(--neon-cyan);
        }

        /* Dinamis Element Cosmic Pop */
        .pop-element {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- CONTAINER VIDEO MULTI-PLAYLIST -->
    <div class="video-container">
        <video id="bg-video" class="video-bg" autoplay muted playsinline>
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <!-- MUSIK LATAR BELAKANG LOKAL -->
    <audio id="audio-track" loop>
        <source src="2.mp3" type="audio/mp3">
    </audio>

    <canvas id="spatial-canvas"></canvas>

    <!-- INTERFACE 1: AMPLOP SURAT UNTUK DIKLIK PASANGAN -->
    <div class="envelope-wrapper" id="envelope-box" onclick="openEnvelope(event)">
        <div class="envelope">✉️</div>
        <div class="envelope-text">Buka Surat dari Sayang ❤️</div>
    </div>

    <!-- INTERFACE 2: KARTU UTAMA UCAPAN -->
    <div class="v25-card" id="card-v25">
        <div class="music-box" id="music-box">
            <div class="music-info">
                <div class="music-title">Our Romantic Song ♪</div>
                <div id="music-status">Sedang Berhenti</div>
            </div>
            <button class="btn-play" onclick="toggleMusic()" id="play-btn">▶</button>
        </div>

        <h1 id="title-v25">Selamat Malam ✨</h1>
        <p class="interactive-text" id="text-v25" onclick="changeLoveMessage(event)">Loading pesan cinta...</p>
        <span class="hint-text" id="hint-v25">💡 ketuk teks di atas untuk ganti pesan</span>
        
        <button class="btn-v25" onclick="spatialBurst(event)">Buka Kejutan ❤️</button>
    </div>

    <script>
        // 1. Playlist Video Berurutan dengan Transisi Mulus
        const videoElement = document.getElementById('bg-video');
        const playlist = ['1.mp4', '3.mp4', '4.mp4'];
        let currentVideoIndex = 0;

        videoElement.addEventListener('ended', function() {
            videoElement.style.opacity = 0; 
            
            setTimeout(() => {
                currentVideoIndex = (currentVideoIndex + 1) % playlist.length;
                videoElement.src = playlist[currentVideoIndex];
                videoElement.load();
                
                videoElement.play().then(() => {
                    videoElement.style.opacity = 0.75; 
                }).catch(err => console.log("Gagal memutar video otomatis."));
            }, 800); 
        });

        // 2. Database Kata-Kata Bucin & Fitur Score Klik
        const jam = new Date().getHours();
        const title = document.getElementById('title-v25');
        const textElement = document.getElementById('text-v25');
        const hintElement = document.getElementById('hint-v25');
        
        let loveMessages = [];
        let currentMessageIndex = 0;
        let tapCount = 0;

        if (jam >= 5 && jam < 11) {
            title.innerText = "Selamat Pagi My Lup 🌅";
            title.className = "pagi-theme";
            loveMessages = [
                "Selamat pagi semesta jiwaku. Hari baru sudah dimulai, dan hal pertama yang langsung terlintas di pikiranku adalah senyumanmu. Semangat hari ini ya, cintaku!",
                "Pagi hari selalu indah, tapi akan jauh lebih indah kalau aku bisa memulainya dengan melihat matamu secara langsung. Have a nice day, sayang!",
                "Energi terbaikku di pagi hari bukan dari secangkir kopi, melainkan dari mengetahui bahwa aku memilikimu untuk menghadapi hari ini. Love you!"
            ];
        } else if (jam >= 11 && jam < 15) {
            title.innerText = "Selamat Siang Bubu <3 ☀️";
            title.className = "siang-theme";
            loveMessages = [
                "Matahari di luar sana boleh saja bersinar terik, tapi kehangatan hatimu tetap yang paling menenangkan. Jangan lupa istirahat dan makan siang ya, kesayanganku.",
                "Di tengah padatnya aktivitas siang ini, jangan lupa kalau di sini ada aku yang selalu merindukanmu setiap detik. Jangan telat makan ya!",
                "Istirahat sejenak yuk sayang. Ingat, kamu sudah berjuang luar biasa hari ini. Jangan terlalu lelah, kesehatanmu itu separuh jiwaku."
            ];
        } else if (jam >= 15 && jam < 18) {
            title.innerText = "Selamat Sore Sayang 🌆";
            title.className = "sore-theme";
            loveMessages = [
                "Senja mulai menyapa bumi, membawa pulang lelahmu hari ini. Terima kasih ya sudah berjuang dengan hebat. Aku selalu bangga dan kagum memilikimu.",
                "Sore hari selalu mengingatkanku betapa tenangnya dunia saat aku bersamamu. Terima kasih telah menjadi bagian terindah dalam hidupku.",
                "Menjelang malam, rasa rinduku padamu malah semakin menumpuk. Cepat selesaikan urusanmu hari ini ya, biar kita bisa mengobrol lagi."
            ];
        } else {
            title.innerText = "Selamat Malam Semestaku ✨";
            title.className = "malam-theme";
            loveMessages = [
                "Malam ini begitu indah, tapi keindahan itu tidak ada apa-apanya dibanding hadirmu di hidupku. Istirahatlah dengan nyenyak, peluk jauh dari lubuk hatiku yang terdalam. Mimpi indah ya, cintaku.",
                "Before you close your eyes, I just want to say thank you for being the sweetest part of my universe. Selamat tidur, sayangku.",
                "Tidurlah yang nyenyak, sayang. Biarkan lelahmu hilang dan semoga di dalam mimpi kita bisa bertemu lagi untuk saling mendekap erat."
            ];
        }

        textElement.innerText = loveMessages[0];

        // FITUR BARU: Trigger Pembukaan Amplop Surat Pertama Kali
        function openEnvelope(e) {
            const wrapper = document.getElementById('envelope-box');
            wrapper.style.opacity = '0';
            wrapper.style.transform = 'scale(0.5)';
            
            setTimeout(() => {
                wrapper.style.display = 'none';
                const cardElement = document.getElementById('card-v25');
                cardElement.classList.add('active');
                
                // Nyalakan musik otomatis secara agresif setelah interaksi
                if(!isPlaying) { toggleMusic(); }
            }, 600);
        }

        // Efek Klik Ganti Pesan + Cosmic Particle Path Melengkung
        function changeLoveMessage(e) {
            currentMessageIndex = (currentMessageIndex + 1) % loveMessages.length;
            tapCount++;
            
            if(tapCount === 1) hintElement.innerText = "❤️ Sayang kamu!";
            else if(tapCount === 3) hintElement.innerText = "💖 Cinta banget sama kamu!";
            else if(tapCount >= 5) hintElement.innerText = "✨ Kamu semestaku selamanya!";

            const clickX = e.clientX;
            const clickY = e.clientY;
            createCosmicHeart(clickX, clickY);

            textElement.style.opacity = 0;
            setTimeout(() => {
                textElement.innerText = loveMessages[currentMessageIndex];
                textElement.style.opacity = 1;
            }, 200);
        }

        function createCosmicHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'pop-element';
            heart.innerText = '❤️';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.fontSize = Math.random() * 15 + 18 + 'px';
            document.body.appendChild(heart);

            const travelDistY = Math.random() * 160 + 120;
            const deviationX = Math.random() * 100 - 50; 
            const rotation = Math.random() * 360 - 180;

            const anim = heart.animate([
                { transform: 'translate(-50%, -50%) scale(0.6) rotate(0deg)', opacity: 1 },
                { transform: `translate(calc(-50% + ${deviationX}px), calc(-50% - ${travelDistY}px)) scale(1.6) rotate(${rotation}deg)`, opacity: 0 }
            ], { duration: 1400, easing: 'cubic-bezier(0.25, 1, 0.5, 1)' });

            anim.onfinish = () => heart.remove();
        }

        const emojis = ['🌸', '✨', '❤️', '💖', '🌹', '🦋', '⭐', '🌷'];

        // 3. Kontrol Audio Romantis & Visualizer Pulse
        const audio = document.getElementById('audio-track');
        const playBtn = document.getElementById('play-btn');
        const musicStatus = document.getElementById('music-status');
        const musicBox = document.getElementById('music-box');
        let isPlaying = false;

        function toggleMusic() {
            if (!isPlaying) {
                audio.play().catch(err => console.log("Interaksi user diperlukan untuk audio."));
                playBtn.innerText = "⏸";
                musicStatus.innerText = "Menemanimu... ♫";
                musicBox.classList.add('playing');
                isPlaying = true;
            } else {
                audio.pause();
                playBtn.innerText = "▶";
                musicStatus.innerText = "Sedang Berhenti";
                musicBox.classList.remove('playing');
                isPlaying = false;
            }
        }

        // 4. Engine Spasial Efek Partikel Canvas
        const canvas = document.getElementById('spatial-canvas');
        const ctx = canvas.getContext('2d');
        let particleArray = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class SpatialParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height + canvas.height;
                this.size = Math.random() * 12 + 10;
                this.speedY = Math.random() * 1.2 + 0.4;
                this.speedX = Math.random() * 0.8 - 0.4;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.y < -40) {
                    this.y = canvas.height + 40;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        for (let i = 0; i < 30; i++) { particleArray.push(new SpatialParticle()); }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particleArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(render);
        }
        render();

        // 5. Efek Interaktif Gerakan 3D Card
        const card = document.getElementById('card-v25');
        document.addEventListener('mousemove', (e) => {
            if(!card.classList.contains('active')) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });
        document.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        // 6. Efek Ledakan Partikel Cinta (Burst)
        function spatialBurst(e) {
            if(!isPlaying) { toggleMusic(); }

            const rect = e.target.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < 65; i++) {
                const pop = document.createElement('div');
                pop.className = 'pop-element';
                pop.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                pop.style.left = startX + 'px';
                pop.style.top = startY + 'px';
                pop.style.fontSize = Math.random() * 20 + 20 + 'px';
                document.body.appendChild(pop);

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 280 + 80;
                const targetX = Math.cos(angle) * distance;
                const targetY = Math.sin(angle) * distance;

                const anim = pop.animate([
                    { transform: 'translate(-50%, -50%) scale(0.1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${targetX}px), calc(-50% + ${targetY}px)) scale(1.8) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], { duration: 1500, easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)' });

                anim.onfinish = () => pop.remove();
            }
        }
    </script>
</body>
</html>
