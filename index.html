<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Portal V40.0</title>
    <style>
        :root { --accent: #ff007f; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #050505; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; transition: filter 1s ease, opacity 0.8s ease; }
        
        .card { 
            background: var(--glass); backdrop-filter: blur(45px); border: 1.5px solid rgba(255,255,255,0.2);
            padding: 35px 25px; border-radius: 40px; text-align: center; width: 85%; max-width: 380px;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); z-index: 10; box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            position: relative;
        }
        .card.hidden { opacity: 0; transform: translateY(80px) scale(0.85); pointer-events: none; }
        
        h1 { font-size: 2rem; margin: 0 0 5px 0; color: #fff; text-shadow: 0 0 20px var(--accent); transition: color 0.5s; }
        
        /* Audio Visualizer */
        .visualizer { display: flex; gap: 4px; justify-content: center; align-items: flex-end; height: 20px; margin-bottom: 15px; opacity: 0; transition: opacity 0.3s; }
        .visualizer.active { opacity: 1; }
        .bar { width: 4px; background: var(--accent); border-radius: 2px; animation: bounce 0.5s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { height: 5px; } to { height: 20px; } }

        /* Carousel Text */
        .text-box { font-size: 1.1rem; line-height: 1.6; min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; cursor: pointer; padding: 10px; border-radius: 15px; transition: background 0.3s; }
        .text-box:hover { background: rgba(255,255,255,0.05); }
        .hint { font-size: 0.7rem; opacity: 0.6; margin-top: -15px; margin-bottom: 20px; display: block; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;}
        .btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); padding: 14px; color: white; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .btn:hover { background: var(--accent); box-shadow: 0 0 15px var(--accent); transform: translateY(-2px); }
        
        .counter-badge { display: inline-block; background: rgba(0,0,0,0.5); border: 1px solid var(--accent); padding: 8px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted playsinline loop><source src="1.mp4" type="video/mp4"></video>

    <div class="card" id="card">
        <h1 id="title">Halo Sayang ✨</h1>
        
        <div class="visualizer" id="vis">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="text-box" id="text" onclick="nextMemory()">Loading...</div>
        <span class="hint">💡 Ketuk teks untuk membaca pesan lainnya</span>

        <div class="btn-grid">
            <button class="btn" onclick="triggerEffect()">Hujan Magis ✨</button>
            <button class="btn" onclick="toggleAudio()">Musik 🎵</button>
            <button class="btn" onclick="changeTheme()">Ganti Tema 🎨</button>
            <button class="btn" onclick="showSurprise()">Kejutan 🎁</button>
        </div>
        
        <div class="counter-badge" id="date-counter">Menghitung hari...</div>
    </div>

    <button style="position: fixed; bottom: 30px; right: 30px; z-index: 100; background: var(--accent); border-radius: 50%; width: 60px; height: 60px; border: none; color: white; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 20px var(--accent); transition: 0.3s;" onclick="toggleCard()" id="eye-btn">👁️</button>

    <audio id="audio" loop><source src="2.mp3" type="audio/mp3"></audio>

    <script>
        const card = document.getElementById('card'), 
              vid = document.getElementById('bg-video'), 
              audio = document.getElementById('audio'), 
              textEl = document.getElementById('text'),
              vis = document.getElementById('vis');
        
        // --- PENGATURAN HARI JADIAN ---
        // Format: TAHUN-BULAN-TANGGAL
        const startDate = new Date("2026-01-08"); 
        const today = new Date();
        const diff = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById('date-counter').innerText = `❤️ ${diff} Hari Bersama ❤️`;

        // --- DATABASE PESAN (MEMORY CAROUSEL) ---
        const memories = [
            "Terima kasih telah hadir di hidupku. Setiap detik bersamamu terasa seperti mimpi yang nyata.",
            "Senyummu adalah favoritku, dan tawamu adalah melodi terbaik di telingaku.",
            "Aku mungkin tidak selalu bisa berjanji hari esok akan sempurna, tapi aku berjanji akan selalu ada untukmu.",
            "You are my today and all of my tomorrows. Aku sayang kamu!"
        ];
        let memIdx = 0;

        function nextMemory() {
            memIdx = (memIdx + 1) % memories.length;
            
            // Efek fade out-in saat ganti teks
            textEl.style.opacity = 0;
            setTimeout(() => {
                textEl.innerText = memories[memIdx];
                textEl.style.opacity = 1;
            }, 300);
        }

        // --- FUNGSI KONTROL ---
        function toggleCard() {
            card.classList.toggle('hidden');
            vid.style.opacity = card.classList.contains('hidden') ? '1' : '0.4';
        }

        function toggleAudio() {
            if(audio.paused) {
                audio.play().catch(() => {});
                vis.classList.add('active');
            } else {
                audio.pause();
                vis.classList.remove('active');
            }
        }

        function changeTheme() {
            const colors = ['#ff007f', '#00f3ff', '#ffd700', '#9d00ff', '#ff3366'];
            const newCol = colors[Math.floor(Math.random() * colors.length)];
            document.documentElement.style.setProperty('--accent', newCol);
            document.getElementById('eye-btn').style.boxShadow = `0 0 20px ${newCol}`;
        }

        function triggerEffect() {
            const symbols = ['❤️', '✨', '🌸', '💖'];
            for(let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.position = 'fixed';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = '-50px';
                el.style.fontSize = (Math.random() * 20 + 15) + 'px';
                el.style.transition = '6s linear';
                el.style.zIndex = '100';
                document.body.appendChild(el);
                
                setTimeout(() => { 
                    el.style.top = '110%'; 
                    el.style.transform = `rotate(${Math.random() * 720}deg)`; 
                }, 50);
                setTimeout(() => el.remove(), 6000);
            }
        }

        function showSurprise() {
            alert("Terima kasih sudah menjadi alasan aku bahagia. I Love You! 💌");
        }

        // --- INISIALISASI SAAT HALAMAN DIBUKA ---
        window.onload = () => {
            const h = new Date().getHours();
            document.getElementById('title').innerText = h < 11 ? "Selamat Pagi MyLup ✨" : h < 15 ? "Selamat Siang Bubu ☀️" : h < 18 ? "Selamat Sore Sayang 🌅" : "Selamat Malam Cintaku 🌙";
            
            textEl.style.transition = "opacity 0.3s";
            textEl.innerText = memories[0];
        }
    </script>
</body>
</html>
